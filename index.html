<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<nav class="navbar">
    <h2>🛒 TechStore Pro</h2>
    <button class="cart-btn"
onclick="document.getElementById('productsContainer').scrollIntoView({behavior:'smooth'})">
🛍️ Shop Now
</button>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>Discover Premium Gadgets</h1>
        <p>Explore smartphones, laptops, watches and accessories.</p>
    </div>
</section>

<section class="controls">
    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search products..."
    >

    <select id="categoryFilter">
        <option value="All">All Categories</option>
        <option value="Phone">Phones</option>
        <option value="Laptop">Laptops</option>
        <option value="Watch">Watches</option>
        <option value="Audio">Audio</option>
    </select>
</section>

<section id="productsContainer" class="products-grid"></section>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script src="script.js"></script>


</body>
</html>
